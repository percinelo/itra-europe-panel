<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITRA Europe Control Panel</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f7fa;
}

h1 {
  margin-bottom: 20px;
}

.filters {
  display: grid;
  gap: 10px;
  margin-bottom: 20px;
}

select, button {
  padding: 10px;
  font-size: 14px;
}

table {
  width: 100%;
  background: white;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
  text-align: left;
}

th {
  background: #111;
  color: white;
}

@media(min-width:768px){
  .filters{
    grid-template-columns: 1fr 1fr 1fr 1fr;
  }
}
</style>
</head>

<body>

<h1>ITRA Europe Races</h1>

<div class="filters">
  <select id="country">
    <option value="all">All Countries</option>
  </select>

  <select id="distance">
    <option value="all">All Distances</option>
    <option value="50">50km+</option>
    <option value="80">80km+</option>
    <option value="100">100km+</option>
    <option value="160">100 Mile+</option>
  </select>

  <button id="sortDate">Sort By Date</button>
</div>

<table>
  <thead>
    <tr>
      <th>Race</th>
      <th>Country</th>
      <th>Date</th>
      <th>Distance</th>
    </tr>
  </thead>
  <tbody id="raceTableBody"></tbody>
</table>

<script src="script.js"></script>

  trigger redeploy

</body>
</html>
